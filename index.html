
<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Groen van Texel</title>
<style>
body{font-family:Arial;margin:0;background:#f5f7fa}
.container{max-width:800px;margin:40px auto;background:#fff;padding:20px;border-radius:10px}
button{background:#1f7a3a;color:#fff;border:none;padding:12px 20px;border-radius:6px;cursor:pointer}
button:disabled{opacity:0.6}
textarea{width:100%;height:150px;margin-top:10px}
</style>
</head>
<body>

<div class="container">
<h2>Winstscan</h2>

<label>Sector</label>
<select id="f-sector">
<option value="ecommerce">E-commerce</option>
<option value="bouw">Bouw</option>
<option value="installatie">Installatie</option>
<option value="transport">Transport</option>
</select>

<label>Plak cijfers (bijv omzet 500000 kosten 420000)</label>
<textarea id="input-data"></textarea>

<br><br>
<button id="f-submit" onclick="Formulier.submit()">Start gratis winstscan →</button>

<pre id="rapport-analyse"></pre>

<div id="upsell" style="display:none;margin-top:20px;background:#eef;padding:15px;border-radius:8px"></div>

</div>

<script>

const SECTOR_DATA = {
  ecommerce:{focus:["marge per productgroep","retouren","ROAS","fulfilment"],impact:"€20k–€100k"},
  bouw:{focus:["faalkosten","overschrijdingen","planning","marge"],impact:"€30k–€100k"},
  installatie:{focus:["projectmarge","nacalculatie","uren","materiaal"],impact:"€20k–€80k"},
  transport:{focus:["rit rendement","brandstof","bezetting","wagenpark"],impact:"€25k–€90k"}
};

function parseData(text){
  const omzet = text.match(/omzet\s*(\d+)/i);
  const kosten = text.match(/kosten\s*(\d+)/i);

  return {
    omzet: omzet ? parseInt(omzet[1]) : null,
    kosten: kosten ? parseInt(kosten[1]) : null
  };
}

function generateAnalyse(sector){
  const d = SECTOR_DATA[sector];
  return `
In uw ${sector}bedrijf zien we duidelijke signalen dat er winst blijft liggen.

BELANGRIJKSTE INZICHTEN:
• ${d.focus[0]} staat onder druk
• ${d.focus[1]} zorgt voor verlies
• ${d.focus[2]} inefficiënt
• ${d.focus[3]} remt groei

IMPACT:
${d.impact} per jaar.
`;
}

function enrich(text,data){
  if(!data.omzet || !data.kosten) return text;
  const winst = data.omzet - data.kosten;
  const gemist = Math.round(winst*0.1);

  return text + `

PERSOONLIJKE INSCHATNING:
U laat circa €${gemist} liggen per jaar.
`;
}

const Formulier={
 async submit(){
  const btn=document.getElementById('f-submit');
  if(btn.disabled)return;

  btn.disabled=true;
  btn.innerText='Analyseren...';

  try{
    const sector=document.getElementById('f-sector').value;
    const raw=document.getElementById('input-data').value;

    const data=parseData(raw);

    let analyse=generateAnalyse(sector);
    analyse=enrich(analyse,data);

    document.getElementById('rapport-analyse').innerText=analyse;

    document.getElementById('upsell').style.display='block';
    document.getElementById('upsell').innerText=
    "Met begeleiding (€249/mnd) sturen we continu op winst en voorkomen we verlies.";

  }catch(e){
    alert(e.message);
  }finally{
    btn.disabled=false;
    btn.innerText='Start gratis winstscan →';
  }
 }
};

</script>

</body>
</html>
