<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groen van Texel v3.6</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<style>
body{font-family:Arial;margin:0;background:#f5f7fb}
.wrap{max-width:900px;margin:auto;padding:30px}
.card{background:#fff;padding:20px;border-radius:12px;margin-bottom:20px}
.btn{background:#0f766e;color:#fff;border:none;padding:12px;width:100%;border-radius:8px}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
<h2>Start winstscan</h2>

<select id="f-sector">
<option value="">— Kies sector —</option>
<option>ZZP’er / Eenmanszaak</option>
<option>Installatietechniek</option>
<option>Bouw</option>
<option>Transport</option>
<option>E-commerce</option>
</select>

<br><br>

<input id="omzet" placeholder="Omzet">
<input id="kosten" placeholder="Kosten">

<br><br>

<button class="btn" onclick="run()">Start scan</button>

</div>

<div class="card" id="result" style="display:none;">
<div id="output"></div>
</div>

</div>

<script>

function run(){
let sector=document.getElementById("f-sector").value;
let omzet=parseFloat(document.getElementById("omzet").value)||0;
let kosten=parseFloat(document.getElementById("kosten").value)||0;

let winst=omzet-kosten;
let impact=Math.round(kosten*0.1);

let tekst="";

if(sector.includes("ZZP")){
tekst=`
<h3>ZZP Analyse</h3>
<p>Je laat waarschijnlijk €${impact} per maand liggen.</p>
<p>Focus op prijs, kosten en winst per uur.</p>
`;
}else{
tekst=`
<h3>Bedrijfsanalyse</h3>
<p>Je laat waarschijnlijk €${impact} per maand liggen.</p>
`;
}

document.getElementById("output").innerHTML=tekst;
document.getElementById("result").style.display="block";
}

</script>

<div style="position:fixed;bottom:10px;left:10px;font-size:11px;color:#888;">
v3.6 live
</div>

</body>
</html>
