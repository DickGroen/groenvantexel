<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Groen van Texel – Index</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial,sans-serif;background:#f4f6f8;margin:0}
.container{max-width:1000px;margin:40px auto;padding:20px}
.card{background:#fff;border-radius:10px;padding:20px;margin-bottom:20px}
.cta{background:#1f4e79;color:#fff;padding:30px;border-radius:10px;text-align:center}
button{background:#27ae60;color:#fff;border:none;padding:15px 25px;border-radius:6px;font-size:16px;cursor:pointer}
h1,h2,h3{margin:0 0 10px}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>
function fmtEur(n){
  return '€ ' + Math.round(n).toLocaleString('nl-NL');
}

function bouw1Pager(d){

  let bev = d.bevindingen || [];

  let totaal = bev.reduce((s,b)=>b.bedrag!=null?s+b.bedrag:s,0);

  if((!totaal || totaal===0) && bev.length){
    const omzet = d.omzet || 0;
    totaal = omzet ? Math.round(omzet * 0.03) : 15000;
  }

  const totaalStr = fmtEur(totaal);

  return `
    <div class="card">
      <h2>${d.bedrijf}, u laat ${totaalStr} per jaar liggen — zonder extra omzet</h2>
      <p>Op basis van uw cijfers — dit zit al in uw bedrijf</p>
    </div>

    <div class="card">
      <h3>Kerncijfers</h3>
      <p>Omzet: ${fmtEur(d.omzet || 0)}</p>
      <p>Brutomarge: ${d.marge || '-'}%</p>
      <p>Debiteurendagen: ${d.deb || '-'} dgn</p>
    </div>

    <div class="card">
      <h3>Waar zit ruimte voor verbetering?</h3>
      ${bev.map(b=>`<p>${b.titel}</p>`).join('')}
    </div>

    <div class="card">
      <h3>Totaal verbeterpotentieel</h3>
      <h2>${totaalStr}</h2>
    </div>

    <div class="cta">
      <h2>Ontdek waar u ${totaalStr} laat liggen →</h2>
      <p>De Basisscan laat exact zien waar dit geld zit en hoe u het terughaalt.</p>
      <button onclick="alert('Basisscan gestart')">
        Start Basisscan – €397
      </button>
      <p style="font-size:12px;margin-top:10px;">
        ✓ geen abonnement • ✓ binnen 5 werkdagen • ✓ direct toepasbaar
      </p>
    </div>
  `;
}

// demo
const data = {
  bedrijf:"Demo BV",
  omzet:1435800,
  marge:49.7,
  deb:50,
  bevindingen:[
    {titel:"Debiteurentermijn kan strakker", bedrag:39337}
  ]
};

document.getElementById("app").innerHTML = bouw1Pager(data);
</script>
</body>
</html>
